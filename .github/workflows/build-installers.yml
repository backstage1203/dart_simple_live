name: Build installers

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: Build Android phone APK
        type: boolean
        default: true
      build_android_tv:
        description: Build Android TV APK
        type: boolean
        default: false
      build_windows:
        description: Build Windows portable package
        type: boolean
        default: false
      build_linux:
        description: Build Linux portable package
        type: boolean
        default: false

env:
  KOTLIN_VERSION: 2.3.21

jobs:
  android:
    if: ${{ inputs.build_android }}
    name: Android phone APK
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Create temporary Android signing files
        run: |
          keytool -genkeypair -v \
            -keystore simple_live_app/android/debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          {
            echo "storeFile=$GITHUB_WORKSPACE/simple_live_app/android/debug.keystore"
            echo "storePassword=android"
            echo "keyPassword=android"
            echo "keyAlias=androiddebugkey"
          } > simple_live_app/android/key.properties

      - name: Align Android Kotlin version
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          kotlin_version = os.environ["KOTLIN_VERSION"]
          android_dir = Path("simple_live_app/android")

          for file in [
              android_dir / "settings.gradle",
              android_dir / "settings.gradle.kts",
              android_dir / "build.gradle",
              android_dir / "build.gradle.kts",
          ]:
              if not file.exists():
                  continue
              text = file.read_text(encoding="utf-8")
              text = re.sub(
                  r'id\("org\.jetbrains\.kotlin\.android"\)\s+version\s+"[^"]+"',
                  f'id("org.jetbrains.kotlin.android") version "{kotlin_version}"',
                  text,
              )
              text = re.sub(
                  r'id [\'"]org\.jetbrains\.kotlin\.android[\'"] version [\'"][^\'"]+[\'"]',
                  f'id "org.jetbrains.kotlin.android" version "{kotlin_version}"',
                  text,
              )
              text = re.sub(
                  r'ext\.kotlin_version\s*=\s*[\'"][^\'"]+[\'"]',
                  f'ext.kotlin_version = "{kotlin_version}"',
                  text,
              )
              file.write_text(text, encoding="utf-8")

          for file in [
              android_dir / "app/build.gradle",
              android_dir / "app/build.gradle.kts",
          ]:
              if not file.exists():
                  continue
              text = file.read_text(encoding="utf-8")
              text = re.sub(
                  r'\s*kotlinOptions\s*\{\s*jvmTarget\s*=\s*JavaVersion\.VERSION_11\.toString\(\)\s*\}',
                  '',
                  text,
                  flags=re.S,
              )
              if "org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_11" not in text:
                  text = text.rstrip() + """

          kotlin {
              compilerOptions {
                  jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_11)
              }
          }
          """
              file.write_text(text + "\n", encoding="utf-8")
          PY
          echo "Kotlin plugin lines after patch:"
          grep -RIn "org.jetbrains.kotlin.android\|kotlin_version" simple_live_app/android
          grep -RIn "org.jetbrains.kotlin.android.*$KOTLIN_VERSION\|kotlin_version.*$KOTLIN_VERSION" simple_live_app/android
          grep -RIn "kotlinOptions\|compilerOptions\|JvmTarget" simple_live_app/android/app || true

      - name: Restore packages
        working-directory: simple_live_app
        run: flutter pub get

      - name: Build debug APK
        working-directory: simple_live_app
        run: flutter build apk --debug --split-per-abi --no-pub

      - name: Collect Android APK
        run: |
          mkdir -p artifacts/android-phone
          cp simple_live_app/build/app/outputs/flutter-apk/*.apk artifacts/android-phone/
          ls -la artifacts/android-phone

      - name: Upload Android APK
        uses: actions/upload-artifact@v6
        with:
          name: android-phone-apk
          path: artifacts/android-phone/
          if-no-files-found: error

  android-tv:
    if: ${{ inputs.build_android_tv }}
    name: Android TV APK
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Create temporary Android TV signing files
        run: |
          keytool -genkeypair -v \
            -keystore simple_live_tv_app/android/debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          {
            echo "storeFile=$GITHUB_WORKSPACE/simple_live_tv_app/android/debug.keystore"
            echo "storePassword=android"
            echo "keyPassword=android"
            echo "keyAlias=androiddebugkey"
          } > simple_live_tv_app/android/key.properties

      - name: Align Android TV Kotlin version
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          kotlin_version = os.environ["KOTLIN_VERSION"]
          android_dir = Path("simple_live_tv_app/android")

          for file in [
              android_dir / "settings.gradle",
              android_dir / "settings.gradle.kts",
              android_dir / "build.gradle",
              android_dir / "build.gradle.kts",
          ]:
              if not file.exists():
                  continue
              text = file.read_text(encoding="utf-8")
              text = re.sub(
                  r'id\("org\.jetbrains\.kotlin\.android"\)\s+version\s+"[^"]+"',
                  f'id("org.jetbrains.kotlin.android") version "{kotlin_version}"',
                  text,
              )
              text = re.sub(
                  r'id [\'"]org\.jetbrains\.kotlin\.android[\'"] version [\'"][^\'"]+[\'"]',
                  f'id "org.jetbrains.kotlin.android" version "{kotlin_version}"',
                  text,
              )
              text = re.sub(
                  r'ext\.kotlin_version\s*=\s*[\'"][^\'"]+[\'"]',
                  f'ext.kotlin_version = "{kotlin_version}"',
                  text,
              )
              file.write_text(text, encoding="utf-8")

          for file in [
              android_dir / "app/build.gradle",
              android_dir / "app/build.gradle.kts",
          ]:
              if not file.exists():
                  continue
              text = file.read_text(encoding="utf-8")
              text = re.sub(
                  r'\s*kotlinOptions\s*\{\s*jvmTarget\s*=\s*JavaVersion\.VERSION_11\.toString\(\)\s*\}',
                  '',
                  text,
                  flags=re.S,
              )
              if "org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_11" not in text:
                  text = text.rstrip() + """

          kotlin {
              compilerOptions {
                  jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_11)
              }
          }
          """
              file.write_text(text + "\n", encoding="utf-8")
          PY
          echo "Kotlin plugin lines after patch:"
          grep -RIn "org.jetbrains.kotlin.android\|kotlin_version" simple_live_tv_app/android
          grep -RIn "org.jetbrains.kotlin.android.*$KOTLIN_VERSION\|kotlin_version.*$KOTLIN_VERSION" simple_live_tv_app/android
          grep -RIn "kotlinOptions\|compilerOptions\|JvmTarget" simple_live_tv_app/android/app || true

      - name: Restore packages
        working-directory: simple_live_tv_app
        run: flutter pub get

      - name: Build debug APK
        working-directory: simple_live_tv_app
        run: flutter build apk --debug --split-per-abi --no-pub

      - name: Collect Android TV APK
        run: |
          mkdir -p artifacts/android-tv
          cp simple_live_tv_app/build/app/outputs/flutter-apk/*.apk artifacts/android-tv/
          ls -la artifacts/android-tv

      - name: Upload Android TV APK
        uses: actions/upload-artifact@v6
        with:
          name: android-tv-apk
          path: artifacts/android-tv/
          if-no-files-found: error

  windows:
    if: ${{ inputs.build_windows }}
    name: Windows portable package
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Restore packages
        working-directory: simple_live_app
        run: flutter pub get

      - name: Build Windows
        working-directory: simple_live_app
        run: flutter build windows --release

      - name: Collect Windows package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows-portable
          Copy-Item -Recurse -Force simple_live_app/build/windows/x64/runner/Release/* artifacts/windows-portable/
          Get-ChildItem artifacts/windows-portable

      - name: Upload Windows package
        uses: actions/upload-artifact@v6
        with:
          name: windows-portable
          path: artifacts/windows-portable/
          if-no-files-found: error

  linux:
    if: ${{ inputs.build_linux }}
    name: Linux portable package
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libasound2-dev libmpv-dev mpv

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Restore packages
        working-directory: simple_live_app
        run: flutter pub get

      - name: Build Linux
        working-directory: simple_live_app
        run: flutter build linux --release

      - name: Collect Linux package
        run: |
          mkdir -p artifacts/linux-portable
          cp -a simple_live_app/build/linux/x64/release/bundle/. artifacts/linux-portable/
          ls -la artifacts/linux-portable

      - name: Upload Linux package
        uses: actions/upload-artifact@v6
        with:
          name: linux-portable
          path: artifacts/linux-portable/
          if-no-files-found: error
