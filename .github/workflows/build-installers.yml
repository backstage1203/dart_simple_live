name: Build installers

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: Build Android phone APK
        type: boolean
        default: true
      build_android_tv:
        description: Build Android TV APK
        type: boolean
        default: true
      build_windows:
        description: Build Windows portable package
        type: boolean
        default: true
      build_linux:
        description: Build Linux portable package
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  KOTLIN_VERSION: 2.3.21

jobs:
  android:
    if: ${{ inputs.build_android }}
    name: Android phone APK
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Create temporary Android signing files
        run: |
          keytool -genkeypair -v \
            -keystore simple_live_app/android/debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          {
            echo "storeFile=$GITHUB_WORKSPACE/simple_live_app/android/debug.keystore"
            echo "storePassword=android"
            echo "keyPassword=android"
            echo "keyAlias=androiddebugkey"
          } > simple_live_app/android/key.properties

      - name: Restore packages
        working-directory: simple_live_app
        run: flutter pub get

      - name: Build debug APK
        working-directory: simple_live_app
        run: flutter build apk --debug --split-per-abi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-phone-apk
          path: simple_live_app/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

  android-tv:
    if: ${{ inputs.build_android_tv }}
    name: Android TV APK
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Create temporary Android TV signing files
        run: |
          keytool -genkeypair -v \
            -keystore simple_live_tv_app/android/debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          {
            echo "storeFile=$GITHUB_WORKSPACE/simple_live_tv_app/android/debug.keystore"
            echo "storePassword=android"
            echo "keyPassword=android"
            echo "keyAlias=androiddebugkey"
          } > simple_live_tv_app/android/key.properties

      - name: Restore packages
        working-directory: simple_live_tv_app
        run: flutter pub get

      - name: Build debug APK
        working-directory: simple_live_tv_app
        run: flutter build apk --debug --split-per-abi

      - name: Upload Android TV APK
        uses: actions/upload-artifact@v4
        with:
          name: android-tv-apk
          path: simple_live_tv_app/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

  windows:
    if: ${{ inputs.build_windows }}
    name: Windows portable package
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Restore packages
        working-directory: simple_live_app
        run: flutter pub get

      - name: Build Windows
        working-directory: simple_live_app
        run: flutter build windows --release

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: simple_live_app/build/windows/x64/runner/Release/**
          if-no-files-found: error

  linux:
    if: ${{ inputs.build_linux }}
    name: Linux portable package
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libasound2-dev libmpv-dev mpv

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Restore packages
        working-directory: simple_live_app
        run: flutter pub get

      - name: Build Linux
        working-directory: simple_live_app
        run: flutter build linux --release

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: linux-portable
          path: simple_live_app/build/linux/x64/release/bundle/**
          if-no-files-found: error
