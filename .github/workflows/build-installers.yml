name: Build installers

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: Build Android phone APK
        type: boolean
        default: true
      build_android_tv:
        description: Build Android TV APK
        type: boolean
        default: true
      build_windows:
        description: Build Windows portable package
        type: boolean
        default: true
      build_linux:
        description: Build Linux portable package
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  KOTLIN_VERSION: 2.3.21

jobs:
  android:
    if: ${{ inputs.build_android }}
    name: Android phone APK
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Create temporary Android signing files
        run: |
          keytool -genkeypair -v \
            -keystore simple_live_app/android/debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          {
            echo "storeFile=$GITHUB_WORKSPACE/simple_live_app/android/debug.keystore"
            echo "storePassword=android"
            echo "keyPassword=android"
            echo "keyAlias=androiddebugkey"
          } > simple_live_app/android/key.properties

      - name: Align Android Kotlin version
        run: |
          set -euo pipefail
          for file in simple_live_app/android/settings.gradle simple_live_app/android/settings.gradle.kts simple_live_app/android/build.gradle simple_live_app/android/build.gradle.kts; do
            if [ -f "$file" ]; then
              perl -0pi -e "s/id\\(\"org\\.jetbrains\\.kotlin\\.android\"\\)\\s+version\\s+\"[^\"]+\"/id(\"org.jetbrains.kotlin.android\") version \"\$ENV{KOTLIN_VERSION}\"/g" "$file"
              perl -0pi -e "s/id 'org\\.jetbrains\\.kotlin\\.android' version '[^']+'/id 'org.jetbrains.kotlin.android' version '\$ENV{KOTLIN_VERSION}'/g" "$file"
              perl -0pi -e "s/id \"org\\.jetbrains\\.kotlin\\.android\" version \"[^\"]+\"/id \"org.jetbrains.kotlin.android\" version \"\$ENV{KOTLIN_VERSION}\"/g" "$file"
              perl -0pi -e "s/ext\\.kotlin_version\\s*=\\s*['\"][^'\"]+['\"]/ext.kotlin_version = \"\$ENV{KOTLIN_VERSION}\"/g" "$file"
            fi
          done
          echo "Kotlin plugin lines after patch:"
          grep -RIn "org.jetbrains.kotlin.android\|kotlin_version" simple_live_app/android
          grep -RIn "org.jetbrains.kotlin.android.*$KOTLIN_VERSION\|kotlin_version.*$KOTLIN_VERSION" simple_live_app/android
          for file in simple_live_app/android/app/build.gradle simple_live_app/android/app/build.gradle.kts; do
            if [ -f "$file" ]; then
              perl -0pi -e 's/\s*kotlinOptions\s*\{\s*jvmTarget\s*=\s*JavaVersion\.VERSION_11\.toString\(\)\s*\}//g' "$file"
              if ! grep -q "org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_11" "$file"; then
                printf '\nkotlin {\n    compilerOptions {\n        jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_11)\n    }\n}\n' >> "$file"
              fi
              grep -n "kotlinOptions\|compilerOptions\|JvmTarget" "$file" || true
            fi
          done

      - name: Restore packages
        working-directory: simple_live_app
        run: flutter pub get

      - name: Build debug APK
        working-directory: simple_live_app
        run: flutter build apk --debug --split-per-abi --no-pub

      - name: Collect Android APK
        run: |
